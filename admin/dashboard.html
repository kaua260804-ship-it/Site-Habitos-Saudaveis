<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard Admin - Hábitos Saudáveis</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-dashboard-body">
    <!-- Navbar -->
    <nav class="admin-nav">
        <div class="admin-nav-brand">
            <i class="fas fa-shield-haltered"></i>
            <span>Painel Admin</span>
        </div>
        <div class="admin-nav-user">
            <span id="adminUserName">Olá, Administrador</span>
            <button class="admin-btn-logout" onclick="fazerLogoutAdmin()">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </nav>

    <!-- Container principal -->
    <div class="admin-container">
        <div class="admin-header">
            <h1>
                <i class="fas fa-dashboard"></i>
                Dashboard
            </h1>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="mudarTab('temas')">
                <i class="fas fa-book"></i> Tópicos
            </button>
            <button class="admin-tab" onclick="mudarTab('subtopicos')">
                <i class="fas fa-list"></i> Subtópicos
            </button>
            <button class="admin-tab" onclick="mudarTab('quizzes')">
                <i class="fas fa-question-circle"></i> Quizzes
            </button>
            <button class="admin-tab" onclick="mudarTab('usuarios')">
                <i class="fas fa-users"></i> Usuários
            </button>
        </div>

        <!-- Conteúdo dinâmico -->
        <div class="admin-content" id="adminContent">
            <!-- Será preenchido pelo JavaScript -->
        </div>
    </div>

    <!-- Modal para adicionar/editar -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content" id="adminModalContent">
            <!-- Será preenchido pelo JavaScript -->
        </div>
    </div>

    <script src="js/admin-auth.js"></script>
    <script src="js/admin-topics.js"></script>
    <script src="js/admin-quiz.js"></script>
    <script src="js/admin-users.js"></script>
    <script src="js/admin-dashboard.js"></script>
</body>
</html>
